services:
  bento:
    build: .
    container_name: bento
    restart: unless-stopped
    ports:
      - "8081:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/bento.db
      - PHOTOS_DIR=/app/data/photos
      # Set to true when serving over HTTPS (homelab usually is, via reverse proxy).
      - BENTO_COOKIE_SECURE=true
      # These are forwarded from `.env` (compose auto-loads it for substitution).
      # Empty defaults so missing values don't break startup.
      - USDA_API_KEY=${USDA_API_KEY:-}
      - BENTO_SESSION_SECRET=${BENTO_SESSION_SECRET:-}
      - BENTO_OPEN_SIGNUP=${BENTO_OPEN_SIGNUP:-false}
