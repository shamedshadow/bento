<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#131815">
  <title>{% block title %}Bento{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/bento.css">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <main{% if no_shell %} class="no-shell"{% endif %}>
    {% block content %}{% endblock %}
  </main>
  {% if request.state.current_user and not no_shell %}
    {% include "_bottom_nav.html" %}
    {% include "_fab.html" %}
  {% endif %}
  {% block scripts %}{% endblock %}
</body>
</html>
