{% import "_icons.html" as icons %}
<form id="favorite-form"
      hx-post="/foods/{{ food.id }}/favorite-toggle"
      hx-target="#favorite-form"
      hx-swap="outerHTML"
      style="display:inline;margin:0;">
  <button type="submit" class="fav-btn {% if favorited %}active{% endif %}"
          title="{% if favorited %}Unfavorite{% else %}Favorite{% endif %}">
    {{ icons.icon('star', 'icon icon-star') }}
    <span>{% if favorited %}Favorited{% else %}Favorite{% endif %}</span>
  </button>
</form>
