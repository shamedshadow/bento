{% extends "base.html" %}
{% block title %}Search foods — Bento{% endblock %}
{% block content %}
{% with back_href="/", title="Search" %}{% include "_top_bar.html" %}{% endwith %}
<h1>Search foods</h1>
<p class="muted">Anything you've logged before, including barcode-scanned and USDA-fetched items.</p>

<div class="card">
  <label>Search by name or brand
    <input type="search" name="q" placeholder="e.g. chicken, yogurt"
           hx-get="/foods/search-results"
           hx-trigger="input changed delay:250ms, search"
           hx-target="#search-results"
           hx-swap="innerHTML"
           autocomplete="off"
           autofocus>
  </label>
  <div id="search-results"></div>
</div>
{% endblock %}
