{% if q %}
  {% if results %}
    <ul class="user-list" style="margin-top:0.75rem;">
      {% for f in results %}
        <li>
          <form method="post" action="/saved-meals/{{ meal.id }}/items"
                style="margin:0;padding:0.6rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;">
            <input type="hidden" name="food_id" value="{{ f.id }}">
            <strong>{{ f.name }}</strong>{% if f.brand %} <span class="muted">— {{ f.brand }}</span>{% endif %}
            <div style="display:flex;gap:0.4rem;align-items:center;margin-top:0.4rem;">
              <input type="number" name="amount_g" min="0.1" step="0.1"
                     value="{{ f.default_serving_g or 100 }}"
                     style="width:6rem;flex:0 0 auto;" required>
              <span class="muted">g</span>
              <button type="submit" style="margin:0;font-size:0.85rem;padding:0.3rem 0.7rem;">Add</button>
            </div>
          </form>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="muted" style="margin-top:0.75rem;">No matches.</p>
  {% endif %}
{% endif %}
